name: Build Cam2OBS Virtual Camera (Fast Ubuntu)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # ⚡ Ubuntu runner – gần như luôn có sẵn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make git curl unzip libavcodec-dev libavfilter-dev libavformat-dev

      - name: Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('.github/theos_version.txt') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos (if not cached)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/theos/theos.git /opt/theos

      - name: Download SDKs (if not cached)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          cp -r sdks-master/*.sdk /opt/theos/sdks/
          rm -rf sdks-master master.zip

      - name: Install ldid (Linux)
        run: |
          # tải ldid bản Linux từ Procursus
          curl -LO https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_2.1.5-procursus7_amd64.deb
          sudo dpkg -i ldid_2.1.5-procursus7_amd64.deb
          sudo apt-get install -f -y

      - name: Build package (rootless)
        run: |
          export THEOS=/opt/theos
          cd cam2obs_vcam
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cam2obs-vcam-rootless
          path: cam2obs_vcam/packages/*.deb
