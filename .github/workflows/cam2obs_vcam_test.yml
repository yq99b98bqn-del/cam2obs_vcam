name: Build Cam2OBS VCAM (Rootless - Ubuntu Fast)

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # Cho phép chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest   # Ubuntu luôn sẵn, build rất nhanh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make git curl unzip

      - name: Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('.github/theos_version.txt') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos (if not cached)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/theos/theos.git /opt/theos

      - name: Download SDKs (if not cached)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          curl -L -o sdk.zip https://github.com/theos/sdks/archive/master.zip
          unzip sdk.zip
          cp -r sdks-master/*.sdk /opt/theos/sdks/
          rm -rf sdk.zip sdks-master

      - name: Install ldid (Linux)
        run: |
          if ! command -v ldid &> /dev/null; then
            curl -LO https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_2.1.5-procursus7_amd64.deb
            sudo dpkg -i ldid_2.1.5-procursus7_amd64.deb || sudo apt-get install -f -y
            rm -f ldid_2.1.5-procursus7_amd64.deb
          fi

      - name: Build package (rootless)
        run: |
          export THEOS=/opt/theos
          if [ ! -d "cam2obs_vcam" ]; then
            echo "❌ Không tìm thấy thư mục cam2obs_vcam"
            echo "Hãy đặt toàn bộ source vào thư mục cam2obs_vcam trong repo"
            exit 1
          fi
          cd cam2obs_vcam
          make clean || true
          make package THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cam2obs-vcam-rootless
          path: cam2obs_vcam/packages/*.deb
